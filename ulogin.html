<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login | Task System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --primary: #27ae60;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .login-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 { margin-top: 0; font-weight: 300; letter-spacing: 1px; }

        #reader {
            width: 100%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 2px solid var(--primary);
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: var(--primary); }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.2s;
        }

        button:active { transform: scale(0.98); opacity: 0.9; }

        .btn-secondary {
            background: #34495e;
            margin-bottom: 10px;
        }

        #status-msg {
            font-size: 12px;
            color: #888;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="login-card">
    <h2>Task System</h2>
    
    <div id="reader"></div>
    
    <button id="start-btn" class="btn-secondary" onclick="startScanner()">Start QR Scanner</button>
    
    <p style="margin: 15px 0; color: #64748b;">— OR —</p>
    
    <input type="text" id="companyId" placeholder="index.html?id=XXX">
    <button onclick="login()">Continue</button>
    
    <div id="status-msg">Camera access required for scanning</div>
</div>

<script>
const html5QrCode = new Html5Qrcode("reader");
// Ensure baseUrl ends with a slash if needed for GitHub Pages
const baseUrl = "https://rahulk9517.github.io/Task-System/";

function isValidStrictPath(text) {
    // Matches "index.html?id=" followed by numbers
    const strictPattern = /^index\.html\?id=\d+$/;
    
    if (!text || text.toLowerCase().includes("http") || !strictPattern.test(text)) {
        return false;
    }
    return true;
}

window.onload = function () {
    const savedPath = localStorage.getItem("userId");
    // FIXED: Corrected 'savPath' to 'savedPath'
    if (savedPath && isValidStrictPath(savedPath)) {
        window.location.href = baseUrl + savedPath;
    }
};

function startScanner() {
    const statusMsg = document.getElementById('status-msg');
    const config = { fps: 15, qrbox: { width: 250, height: 250 } };
    
    html5QrCode.start(
        { facingMode: "environment" }, 
        config,
        (decodedText) => {
            if (!isValidStrictPath(decodedText)) {
                statusMsg.innerText = "Invalid QR! Use correct Employee QR.";
                statusMsg.style.color = "#e74c3c";
                return; 
            }

            document.getElementById('companyId').value = decodedText;
            statusMsg.innerText = "Verified! Logging in...";
            statusMsg.style.color = "#27ae60";
            
            setTimeout(() => {
                html5QrCode.stop().then(() => login());
            }, 600);
        }
    ).catch(err => {
        statusMsg.innerText = "Camera Error: " + err;
        console.error(err);
    });
}

function login() {
    let input = document.getElementById('companyId').value.trim();

    if (!isValidStrictPath(input)) {
        alert("Incorrect Format!");
        return;
    }

    localStorage.setItem("userId", input);
    window.location.href = baseUrl + input;
}
</script>

</body>
</html>
